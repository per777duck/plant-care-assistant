<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCare</title>
</head>
<body>

    <!-- Верхняя панель -->
    <header>

        <!-- Логотип -->
        <div>
            <h2>PlantCare</h2>
        </div>

        <!-- Поиск -->
        <div>
            <input type="text" placeholder="Поиск растения...">
            <button>Поиск</button>
        </div>

        <!-- Правая часть -->
        <nav>
            <button>💬 Чат</button>
            <button>🔔 Уведомления</button>
            <button>👤 Аккаунт</button>
        </nav>

    </header>

    <!-- Основная часть -->
    <main>

        <!-- Левая панель -->
        <aside>

            <button>📚 Справочник</button>
            <button>🌿 Мои растения</button>
            <button>⭐ Избранное</button>

        </aside>

        <!-- Центральная часть -->
        <section>

            <h1>Справочник растений</h1>

            <!-- Контейнер со всеми карточками -->
            <div>

                <article>
                    <h2>Монстера</h2>
                    <p>Полив...</p>
                    <button>Добавить</button>
                </article>

                <article>
                    <h2>Фикус</h2>
                    <p>Полив...</p>
                    <button>Добавить</button>
                </article>

                <article>
                    <h2>Кактус</h2>
                    <p>Полив...</p>
                    <button>Добавить</button>
                </article>

            </div>

        </section>

    </main>

</body>
</html>
